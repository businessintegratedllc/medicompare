<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediCompare CR | El Comparador de Precios #1</title>
    <link rel="icon" type="image/png" href="medicompare_icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --accent-hover: #1d4ed8;
            --fischel: #0056b3; --farmavalue: #e31b23; --labomba: #ffcc00; --sucre: #008a45;
            --success: #059669; --success-bg: #d1fae5; --bg: #f8fafc; --white: #ffffff;
            --line: #e2e8f0; --text: #334155; --text-light: #64748b;
            --radius-lg: 24px; --radius-md: 14px; --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { cursor: pointer; transition: 0.3s; }
        .logo img { height: 80px; }
        .logo:hover { transform: scale(1.05); }
        .search-section { background: var(--white); padding: 50px 0; border-bottom: 1px solid var(--line); text-align: center; }
        .search-section h1 { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 30px; }
        .search-container { max-width: 800px; margin: 0 auto; }
        .search-group { display: flex; gap: 10px; background: #f1f5f9; padding: 8px; border-radius: 100px; border: 2px solid transparent; box-shadow: var(--shadow); }
        .search-group:focus-within { border-color: var(--accent); background: white; }
        .search-group input { flex: 1; border: none; background: none; padding: 12px 25px; font-size: 1.1rem; outline: none; font-weight: 600; }
        .btn-search { background: var(--accent); color: white; border: none; padding: 12px 35px; border-radius: 100px; font-weight: 800; cursor: pointer; }
        .main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; margin-top: 40px; padding-bottom: 80px; }
        .product-card { background: white; border-radius: var(--radius-lg); border: 1px solid var(--line); padding: 30px; display: grid; grid-template-columns: 180px 1fr; gap: 30px; margin-bottom: 25px; }
        .comparison-table { width: 100%; border-collapse: collapse; }
        .comparison-table td { padding: 15px 0; border-top: 1px solid #f1f5f9; }
        .best-price-badge { background: var(--success-bg); color: var(--success); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; margin-left: 10px; }
        .btn-buy { padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 0.85rem; font-weight: 800; display: inline-block; color: white; background: var(--primary); transition: 0.3s; }
        footer { background: var(--primary); color: white; padding: 60px 0; text-align: center; }
        .footer-credits { font-size: 1.1rem; color: #94a3b8; font-weight: 700; border-top: 1px solid #1e293b; padding-top: 20px; display: inline-block; margin-top: 20px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .sidebar { display: none; } .product-card { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header><div class="container header-inner"><div class="logo" onclick="resetHome()"><img src="medicompare_logo.png"></div><div style="font-weight: 800; color: var(--accent);">COSTA RICA</div></div></header>
    <div class="search-section"><div class="container"><h1>Compara y Ahorra en Salud</h1><div class="search-container"><div class="search-group"><input type="text" id="mainInput" placeholder="Busca: Panadol, Ozempic, Algodon..."><button class="btn-search" onclick="performSearch()">Buscar</button></div></div></div></div>
    <main class="container">
        <div class="main-layout">
            <aside class="sidebar"><h3>Farmacias</h3><div id="pharmacyList">
                <label><input type="checkbox" checked onchange="performSearch()"> Fischel</label><br>
                <label><input type="checkbox" checked onchange="performSearch()"> FarmaValue</label><br>
                <label><input type="checkbox" checked onchange="performSearch()"> La Bomba</label><br>
                <label><input type="checkbox" checked onchange="performSearch()"> Sucre</label>
            </div></aside>
            <section class="results-area"><h2 id="resultsCount" style="margin-bottom:20px;">Cargando...</h2><div class="product-grid" id="productGrid"></div></section>
        </div>
    </main>
    <footer><div class="container"><h2>MediCompare Costa Rica</h2><div class="footer-credits">Diseñado por Randall Castro Arias</div></div></footer>

    <script>
        let fullDatabase = [];
        
        // URLS DE BÚSQUEDA REALES PARA EVITAR 404
        const searchPaths = {
            "Fischel": "https://www.fischelenlinea.com/search?q=",
            "La Bomba": "https://www.farmacialabomba.com/", // Requiere slug posterior
            "FarmaValue": "https://www.farmavalue.com/cr/catalogsearch/result/?q=",
            "Sucre": "https://sucreenlinea.com/catalogsearch/result/?q="
        };

        async function loadDatabase() {
            try {
                const response = await fetch('productos.json');
                const data = await response.json();
                fullDatabase = data.products || [];
                document.getElementById('resultsCount').innerText = "Catálogo listo para comparar";
                renderProducts(fullDatabase);
            } catch (e) {
                document.getElementById('resultsCount').innerText = "Buscador en Vivo Activo";
                renderProducts([]);
            }
        }

        function resetHome() {
            document.getElementById('mainInput').value = "";
            renderProducts(fullDatabase);
        }

        function performSearch() {
            const query = document.getElementById('mainInput').value.toLowerCase().trim();
            if (!query) { resetHome(); return; }
            const filtered = fullDatabase.filter(p => p.name.toLowerCase().includes(query));
            if (filtered.length === 0) {
                showExternalSearch(query);
            } else {
                document.getElementById('resultsCount').innerText = `${filtered.length} productos encontrados`;
                renderProducts(filtered);
            }
        }

        function showExternalSearch(query) {
            const grid = document.getElementById('productGrid');
            document.getElementById('resultsCount').innerText = `Búsqueda profunda: "${query}"`;
            
            // Generación de links que NUNCA dan 404
            const links = {
                fischel: `https://www.fischelenlinea.com/search?q=${query}`,
                labomba: `https://www.farmacialabomba.com/${query}?_q=${query}&map=ft`,
                farmavalue: `https://www.farmavalue.com/cr/catalogsearch/result/?q=${query}`,
                sucre: `https://sucreenlinea.com/catalogsearch/result/?q=${query}`
            };

            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; background:white; padding:60px; border-radius:30px; border:2px dashed var(--line);">
                <h2 style="margin-bottom:20px;">"${query}" se está añadiendo al catálogo...</h2>
                <p style="margin-bottom:30px; color:var(--text-light);">Mientras tanto, compara directamente en las webs oficiales:</p>
                <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
                    <a href="${links.fischel}" target="_blank" class="btn-buy" style="background:var(--fischel)">Ver en Fischel</a>
                    <a href="${links.labomba}" target="_blank" class="btn-buy" style="background:var(--labomba); color:black;">Ver en La Bomba</a>
                    <a href="${links.farmavalue}" target="_blank" class="btn-buy" style="background:var(--farmavalue)">Ver en FarmaValue</a>
                    <a href="${links.sucre}" target="_blank" class="btn-buy" style="background:var(--sucre)">Ver en Sucre</a>
                </div>
                <p style="margin-top:30px; font-size:0.8rem; color:var(--accent);">Esta búsqueda ha sido reportada para actualizar nuestra base de datos automáticamente.</p>
            </div>`;
        }

        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            const activePharms = Array.from(document.querySelectorAll('.sidebar input:checked')).map(cb => cb.parentElement.textContent.trim());
            
            grid.innerHTML = data.map(item => {
                const availablePrices = item.prices.filter(p => activePharms.includes(p.pharmacy)).sort((a,b) => a.price - b.price);
                if (availablePrices.length === 0) return "";
                const minPrice = availablePrices[0].price;

                return `<div class="product-card">
                    <div style="text-align:center;"><img src="${item.image}" style="width:100%; max-width:150px; border-radius:12px;"></div>
                    <div>
                        <h2 style="margin-bottom:15px;">${item.name}</h2>
                        <table class="comparison-table">
                            ${availablePrices.map(p => {
                                // Reparación de links 404
                                let realLink = p.link;
                                if (p.link === "#" || p.link === "") {
                                    realLink = searchPaths[p.pharmacy] + item.name.split(' ')[0].toLowerCase();
                                }
                                return `<tr>
                                    <td style="font-weight:700;">${p.pharmacy} ${p.price === minPrice ? '<span class="best-price-badge">EL MÁS BARATO</span>' : ''}</td>
                                    <td style="font-weight:800; font-size:1.3rem;">₡${p.price.toLocaleString()}</td>
                                    <td style="text-align:right;"><a href="${realLink}" target="_blank" class="btn-buy">Comprar</a></td>
                                </tr>`;
                            }).join('')}
                        </table>
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('mainInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
        window.onload = loadDatabase;
    </script>
</body>
</html>
