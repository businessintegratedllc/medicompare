<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediCompare CR | Comparador de Precios #1</title>
    <link rel="icon" type="image/png" href="medicompare_icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #0d9488; --accent-hover: #0f766e;
            --fischel: #0056b3; --farmavalue: #e31b23; --labomba: #eab308; --sucre: #008a45;
            --bg: #f8fafc; --white: #ffffff; --line: #e2e8f0; --text: #1e293b; --text-light: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* Logo e Identidad - 100% Español */
        header { background: var(--white); border-bottom: 2px solid var(--line); position: sticky; top: 0; z-index: 1000; padding: 20px 0; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; gap: 15px; cursor: pointer; text-decoration: none; }
        .logo-icon { background: var(--accent); color: white; width: 65px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 2.2rem; }
        .logo-text div { color: var(--primary); font-weight: 900; font-size: 2.2rem; line-height: 1; }
        .logo-text span { color: var(--accent); font-size: 0.95rem; font-weight: 700; text-transform: uppercase; }
        
        .hero { background: var(--white); padding: 70px 0; border-bottom: 1px solid var(--line); text-align: center; }
        .hero h1 { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
        .search-box { max-width: 850px; margin: 0 auto; display: flex; gap: 10px; background: #f1f5f9; padding: 10px; border-radius: 100px; border: 2px solid transparent; }
        .search-box:focus-within { border-color: var(--accent); background: white; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.12); }
        .search-box input { flex: 1; border: none; background: none; padding: 10px 30px; font-size: 1.3rem; outline: none; font-weight: 600; color: var(--primary); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 14px 60px; border-radius: 100px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }

        .layout { display: grid; grid-template-columns: 280px 1fr; gap: 50px; margin: 60px 0; padding-bottom: 120px; }
        .sidebar { background: white; border-radius: 30px; border: 1px solid var(--line); padding: 35px; height: fit-content; position: sticky; top: 140px; }
        .product-grid { display: grid; gap: 35px; }
        .product-card { background: white; border-radius: 40px; border: 1px solid var(--line); padding: 45px; display: grid; grid-template-columns: 220px 1fr; gap: 50px; }
        
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        .comp-table td { padding: 25px 0; border-top: 1px solid #f1f5f9; }
        .price-val { font-weight: 900; font-size: 1.8rem; color: var(--accent); }
        .badge-best { background: #d1fae5; color: #065f46; padding: 8px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: 800; margin-left: 15px; text-transform: uppercase; }
        .btn-go { padding: 15px 30px; border-radius: 15px; text-decoration: none; font-size: 1rem; font-weight: 800; background: var(--primary); color: white; }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 100px 50px; background: white; border-radius: 50px; border: 2px dashed var(--line); }
        .deep-btns { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 40px; }
        .btn-deep { padding: 20px 35px; border-radius: 18px; color: white; text-decoration: none; font-weight: 800; min-width: 220px; text-align: center; }

        footer { background: var(--primary); color: white; padding: 100px 0; text-align: center; }
        .credits-box { font-size: 1.4rem; color: #94a3b8; font-weight: 800; border-top: 2px solid #1e293b; padding-top: 40px; margin-top: 40px; display: inline-block; }
    </style>
</head>
<body>
    <header><div class="container header-inner">
        <a href="javascript:location.reload()" class="logo-box">
            <div class="logo-icon">MC</div>
            <div class="logo-text"><div>MediCompare</div><span>Comparador de Precios</span></div>
        </a>
        <div style="font-weight: 900; color: var(--accent); font-size: 1.2rem;">COSTA RICA</div>
    </div></header>
    
    <div class="hero"><div class="container">
        <h1>Tu medicina al precio justo.</h1>
        <div class="search-box"><input type="text" id="searchInput" placeholder="Escribe el nombre del medicamento..."><button class="btn-main" onclick="startSearch()">Buscar</button></div>
    </div></div>

    <main class="container"><div class="layout">
        <aside class="sidebar"><h3>Farmacias</h3>
            <label><input type="checkbox" checked onchange="startSearch()"> Fischel</label><br>
            <label><input type="checkbox" checked onchange="startSearch()"> FarmaValue</label><br>
            <label><input type="checkbox" checked onchange="startSearch()"> La Bomba</label><br>
            <label><input type="checkbox" checked onchange="startSearch()"> Sucre</label>
        </aside>
        <section class="results"><h2 id="statusText" style="margin-bottom:35px; font-weight: 900;">Catálogo</h2><div class="product-grid" id="mainGrid"></div></section>
    </div></main>

    <footer><div class="container"><div style="font-weight: 900; font-size: 2.5rem;">MediCompare</div><div class="credits-box">Diseñado por <span>Randall Castro Arias</span></div></div></footer>

    <script>
        let db = [];
        
        function getSearchUrl(pharmacy, term) {
            const q = encodeURIComponent(term.split(' ')[0]);
            const cacheBuster = `&v=${Date.now()}`; // FUERZA A LA PÁGINA A LIMPIARSE

            if (pharmacy === "Fischel") return `https://fischelenlinea.com/busqueda?f=${q}${cacheBuster}`;
            if (pharmacy === "FarmaValue") return `https://www.farmavalue.com/cr/catalogsearch/result/?q=${q}${cacheBuster}`;
            if (pharmacy === "La Bomba") return `https://www.farmacialabomba.com/busqueda?f=${q}${cacheBuster}`;
            if (pharmacy === "Sucre") return `https://sucreenlinea.com/catalogsearch/result/?q=${q}${cacheBuster}`;
            return "#";
        }

        async function init() {
            try {
                const res = await fetch('productos.json');
                const data = await res.json();
                db = data.products || [];
                document.getElementById('statusText').innerText = `Catálogo Actualizado`;
                render(db);
            } catch (e) { render([]); }
        }

        function startSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { render(db); return; }
            const filtered = db.filter(p => p.name.toLowerCase().includes(query));
            if (filtered.length === 0) { showDeepSearch(query); } 
            else { render(filtered); }
        }

        function showDeepSearch(query) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = `<div class="empty-state">
                <h2 style="margin-bottom:20px;">"${query}" no está en el catálogo local</h2>
                <div class="deep-btns">
                    <a href="${getSearchUrl('Fischel', query)}" target="_blank" class="btn-deep" style="background:var(--fischel)">En Fischel</a>
                    <a href="${getSearchUrl('FarmaValue', query)}" target="_blank" class="btn-deep" style="background:var(--farmavalue)">En FarmaValue</a>
                    <a href="${getSearchUrl('La Bomba', query)}" target="_blank" class="btn-deep" style="background:var(--labomba); color:black;">En La Bomba</a>
                    <a href="${getSearchUrl('Sucre', query)}" target="_blank" class="btn-deep" style="background:var(--sucre)">En Sucre</a>
                </div>
            </div>`;
        }

        function render(data) {
            const grid = document.getElementById('mainGrid');
            const active = Array.from(document.querySelectorAll('.sidebar input:checked')).map(cb => cb.parentElement.textContent.trim());
            grid.innerHTML = data.map(item => {
                const prices = item.prices.filter(p => active.includes(p.pharmacy)).sort((a,b) => a.price - b.price);
                if (prices.length === 0) return "";
                const min = prices[0].price;
                return `<div class="product-card">
                    <div style="text-align:center;"><img src="${item.image}" style="width:100%; max-width:180px; border-radius:20px;"></div>
                    <div><h2>${item.name}</h2><table class="comp-table">${prices.map(p => `<tr>
                        <td style="font-weight:800;">${p.pharmacy} ${p.price === min && prices.length > 1 ? '<span class="badge-best">Mejor Precio</span>' : ''}</td>
                        <td class="price-val">₡${p.price.toLocaleString()}</td>
                        <td style="text-align:right;"><a href="${getSearchUrl(p.pharmacy, item.name)}" target="_blank" class="btn-go">Comprar</a></td>
                    </tr>`).join('')}</table></div></div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') startSearch(); });
        window.onload = init;
    </script>
</body>
</html>
