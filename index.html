<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediCompare CR | Comparador de Precios Real</title>
    <link rel="icon" type="image/png" href="medicompare_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --accent-hover: #1d4ed8;
            --fischel: #0056b3; --farmavalue: #e31b23; --labomba: #ffcc00; --sucre: #008a45;
            --success: #059669; --success-bg: #d1fae5; --bg: #f8fafc; --white: #ffffff;
            --line: #e2e8f0; --text: #334155; --text-light: #64748b;
            --radius-lg: 24px; --radius-md: 14px; --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 1000; padding: 18px 0; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo img { height: 65px; transition: 0.3s; }
        .logo:hover img { transform: scale(1.05); }
        .search-section { background: var(--white); padding: 60px 0; border-bottom: 1px solid var(--line); text-align: center; }
        .search-section h1 { font-size: 2.8rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; letter-spacing: -0.02em; }
        .search-container { max-width: 850px; margin: 0 auto; }
        .search-group { display: flex; gap: 12px; background: #f1f5f9; padding: 8px; border-radius: 100px; border: 2px solid transparent; box-shadow: var(--shadow); }
        .search-group:focus-within { border-color: var(--accent); background: white; }
        .search-group input { flex: 1; border: none; background: none; padding: 14px 30px; font-size: 1.2rem; outline: none; font-weight: 600; }
        .btn-search { background: var(--accent); color: white; border: none; padding: 14px 40px; border-radius: 100px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-search:hover { background: var(--accent-hover); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 40px; margin-top: 50px; padding-bottom: 100px; }
        .filter-card { background: white; border-radius: var(--radius-md); border: 1px solid var(--line); padding: 24px; margin-bottom: 24px; }
        .filter-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--text-light); letter-spacing: 0.08em; margin-bottom: 20px; display: block; }
        .pharmacy-check { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        .product-grid { display: grid; gap: 30px; }
        .product-card { background: white; border-radius: var(--radius-lg); border: 1px solid var(--line); padding: 35px; display: grid; grid-template-columns: 200px 1fr; gap: 40px; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 30px 40px -15px rgb(0 0 0 / 0.1); border-color: var(--accent); }
        .product-visual img { width: 100%; border-radius: 16px; mix-blend-mode: multiply; }
        .comparison-table { width: 100%; border-collapse: collapse; }
        .comparison-table td { padding: 18px 0; border-top: 1px solid #f1f5f9; }
        .price-col { font-weight: 800; font-size: 1.3rem; color: var(--primary); }
        .best-price-badge { background: var(--success-bg); color: var(--success); padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; margin-left: 12px; }
        .btn-buy { padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 0.85rem; font-weight: 800; }
        footer { background: var(--primary); color: white; padding: 80px 0; text-align: center; margin-top: 80px; }
        .footer-credits { font-size: 1rem; color: #94a3b8; font-weight: 700; border-top: 1px solid #1e293b; padding-top: 20px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <header><div class="container header-inner"><a href="#" class="logo"><img src="medicompare_logo.png"></a><div style="font-weight: 800; color: var(--accent);">COSTA RICA</div></div></header>
    <div class="search-section"><div class="container"><h1>Compara precios de salud en segundos</h1><p>Encuentra el mejor precio entre Fischel, FarmaValue, La Bomba y Sucre.</p><div class="search-container"><div class="search-group"><input type="text" id="mainInput" placeholder="Busca un medicamento..."><button class="btn-search" onclick="performSearch()">Buscar</button></div></div></div></div>
    <main class="container"><div class="main-layout"><aside class="sidebar"><h3>Filtros</h3><div class="filter-card"><span class="filter-title">Farmacias</span>
        <label class="pharmacy-check"><input type="checkbox" checked onchange="performSearch()"> Fischel</label>
        <label class="pharmacy-check"><input type="checkbox" checked onchange="performSearch()"> FarmaValue</label>
        <label class="pharmacy-check"><input type="checkbox" checked onchange="performSearch()"> La Bomba</label>
        <label class="pharmacy-check"><input type="checkbox" checked onchange="performSearch()"> Sucre</label>
    </div></aside><section class="results-area"><h2 id="resultsCount" style="margin-bottom:20px;">Cargando base de datos...</h2><div class="product-grid" id="productGrid"></div></section></div></main>
    <footer><div class="container"><h2>MediCompare Costa Rica</h2><div class="footer-credits">Diseñado por Randall Castro Arias</div><p style="margin-top:20px; font-size:0.8rem; color:#475569;">© 2026 Datos actualizados diariamente.</p></div></footer>

    <script>
        let fullDatabase = [];

        // Cargar Base de Datos Real
        async function loadDatabase() {
            try {
                const response = await fetch('productos.json');
                const data = await response.json();
                fullDatabase = data.products;
                document.getElementById('resultsCount').innerText = `Base de datos actualizada: ${data.last_update}`;
                performSearch();
            } catch (e) {
                console.error("Error cargando productos", e);
                document.getElementById('resultsCount').innerText = "Error al conectar con la base de datos.";
            }
        }

        function performSearch() {
            const query = document.getElementById('mainInput').value.toLowerCase();
            const grid = document.getElementById('productGrid');
            const activePharms = Array.from(document.querySelectorAll('.sidebar input:checked')).map(cb => cb.parentElement.textContent.trim());
            
            const filtered = fullDatabase.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
            
            grid.innerHTML = filtered.map(item => {
                const prices = item.prices.filter(p => activePharms.includes(p.pharmacy));
                if (prices.length === 0) return "";
                const minPrice = Math.min(...prices.map(p => p.price));
                
                return `
                <div class="product-card">
                    <div class="product-visual"><img src="${item.image}"><span class="cat-tag">${item.category}</span></div>
                    <div class="product-info">
                        <h2>${item.name}</h2><p class="product-meta">${item.meta}</p>
                        <table class="comparison-table">
                            ${prices.map(p => `
                                <tr>
                                    <td class="pharmacy-name">${p.pharmacy} ${p.price === minPrice ? '<span class="best-price-badge">Mejor Opción</span>' : ''}</td>
                                    <td class="price-col">₡${p.price.toLocaleString()}</td>
                                    <td class="action-col"><a href="${p.link}" target="_blank" class="btn-buy" style="background:var(--accent-hover); color:white;">Ver en Tienda</a></td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('mainInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
        window.onload = loadDatabase;
    </script>

</html>
