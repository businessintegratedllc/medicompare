<!-- REEMPLAZA EL SCRIPT DE TU INDEX.HTML CON ESTE MEJORADO -->
<script>
    let fullDatabase = [];

    async function loadDatabase() {
        const countLabel = document.getElementById('resultsCount');
        try {
            const response = await fetch('productos.json');
            const data = await response.json();
            fullDatabase = data.products || [];
            countLabel.innerText = `Catálogo actualizado: ${data.last_update}`;
            renderProducts(fullDatabase);
        } catch (e) {
            countLabel.innerText = "Modo Online: Buscando en tiempo real...";
            renderProducts([]); 
        }
    }

    function performSearch() {
        const query = document.getElementById('mainInput').value.toLowerCase().trim();
        const grid = document.getElementById('productGrid');
        
        if (!query) {
            renderProducts(fullDatabase);
            document.getElementById('resultsCount').innerText = "Productos destacados";
            return;
        }

        const filtered = fullDatabase.filter(p => 
            p.name.toLowerCase().includes(query) || 
            (p.category && p.category.toLowerCase().includes(query))
        );

        if (filtered.length === 0) {
            showExternalSearch(query);
        } else {
            document.getElementById('resultsCount').innerText = `${filtered.length} comparativas encontradas para "${query}"`;
            renderProducts(filtered);
        }
    }

    function renderProducts(data) {
        const grid = document.getElementById('productGrid');
        const activePharms = Array.from(document.querySelectorAll('.sidebar input:checked')).map(cb => cb.parentElement.textContent.trim());

        grid.innerHTML = data.map(item => {
            // Filtrar precios por farmacias seleccionadas y ordenarlos de menor a mayor
            const availablePrices = item.prices
                .filter(p => activePharms.includes(p.pharmacy))
                .sort((a, b) => a.price - b.price);

            if (availablePrices.length === 0) return "";
            
            const minPrice = availablePrices[0].price;

            return `
            <div class="product-card">
                <div class="product-visual">
                    <img src="${item.image}">
                    <div style="margin-top:10px; font-weight:800; color:var(--text-light); font-size:0.7rem; text-transform:uppercase;">${item.category}</div>
                </div>
                <div class="product-info">
                    <h2 style="margin-bottom:20px;">${item.name}</h2>
                    <table class="comparison-table">
                        ${availablePrices.map(p => `
                            <tr>
                                <td style="font-weight:700; width:40%;">
                                    ${p.pharmacy} 
                                    ${p.price === minPrice ? '<span class="best-price-badge">¡MEJOR PRECIO!</span>' : ''}
                                </td>
                                <td style="font-weight:800; font-size:1.3rem; color:var(--primary);">₡${p.price.toLocaleString()}</td>
                                <td style="text-align:right;">
                                    <a href="${p.link}" target="_blank" class="btn-buy" style="background:var(--accent); color:white; border-radius:10px; padding:10px 20px;">Comprar Ahora</a>
                                </td>
                            </tr>
                        `).join('')}
                    </table>
                </div>
            </div>`;
        }).join('');
    }

    function showExternalSearch(query) {
        const grid = document.getElementById('productGrid');
        document.getElementById('resultsCount').innerText = `Búsqueda profunda para "${query}"`;
        grid.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; background:white; padding:60px; border-radius:30px; border:2px dashed var(--line);">
                <h2 style="margin-bottom:20px;">"${query}" no está en el catálogo rápido</h2>
                <p style="margin-bottom:30px; color:var(--text-light);">Hemos activado el motor de búsqueda directa en las 4 farmacias oficiales:</p>
                <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
                    <a href="https://fischelenlinea.com/search?q=${query}" target="_blank" class="btn-buy" style="background:var(--fischel); color:white;">Buscar en Fischel</a>
                    <a href="https://farmacialabomba.com/${query}?_q=${query}&map=ft" target="_blank" class="btn-buy" style="background:var(--labomba); color:black;">Buscar en La Bomba</a>
                    <a href="https://www.farmavalue.com/cr/catalogsearch/result/?q=${query}" target="_blank" class="btn-buy" style="background:var(--farmavalue); color:white;">Buscar en FarmaValue</a>
                    <a href="https://sucreenlinea.com/catalogsearch/result/?q=${query}" target="_blank" class="btn-buy" style="background:var(--sucre); color:white;">Buscar en Sucre</a>
                </div>
            </div>`;
    }
</script>
