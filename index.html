<!-- REEMPLAZA EL SCRIPT DE TU INDEX.HTML CON ESTE VERIFICADO -->
<script>
    let fullDatabase = [];
    
    // PATRONES DE BÚSQUEDA REALES Y VERIFICADOS
    const pharmacyEngines = {
        "Fischel": "https://www.fischelenlinea.com/", // Fischel usa slugs directos o /search?q=
        "FarmaValue": "https://www.farmavalue.com/cr/catalogsearch/result/?q=",
        "La Bomba": "https://www.farmacialabomba.com/",
        "Sucre": "https://sucreenlinea.com/catalogsearch/result/?q="
    };

    function getRealLink(pharmacy, productName) {
        const term = encodeURIComponent(productName.toLowerCase());
        const slug = productName.toLowerCase().replace(/ /g, '-');
        
        switch(pharmacy) {
            case "Fischel":
                return `https://www.fischelenlinea.com/search?q=${term}`;
            case "FarmaValue":
                return `https://www.farmavalue.com/cr/catalogsearch/result/?q=${term}`;
            case "La Bomba":
                return `https://www.farmacialabomba.com/${slug}?_q=${slug}&map=ft`;
            case "Sucre":
                return `https://sucreenlinea.com/catalogsearch/result/?q=${term}`;
            default:
                return "#";
        }
    }

    async function loadDatabase() {
        const countLabel = document.getElementById('resultsCount');
        try {
            const response = await fetch('productos.json');
            const data = await response.json();
            fullDatabase = data.products || [];
            countLabel.innerText = `Comparador actualizado: ${data.last_update}`;
            renderProducts(fullDatabase);
        } catch (e) {
            countLabel.innerText = "Buscador Inteligente Activo";
            renderProducts([]); 
        }
    }

    function performSearch() {
        const query = document.getElementById('mainInput').value.toLowerCase().trim();
        if (!query) { renderProducts(fullDatabase); return; }
        
        const filtered = fullDatabase.filter(p => p.name.toLowerCase().includes(query));
        
        if (filtered.length === 0) {
            showDeepSearch(query);
        } else {
            document.getElementById('resultsCount').innerText = `${filtered.length} ofertas encontradas`;
            renderProducts(filtered);
        }
    }

    function showDeepSearch(query) {
        const grid = document.getElementById('productGrid');
        const encoded = encodeURIComponent(query);
        const slug = query.replace(/ /g, '-');

        grid.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; background:white; padding:60px; border-radius:30px; border:2px solid var(--line);">
                <h2 style="margin-bottom:20px;">Buscando "${query}" en todas las farmacias...</h2>
                <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
                    <a href="https://www.fischelenlinea.com/search?q=${encoded}" target="_blank" class="btn-buy" style="background:var(--fischel)">Comprar en Fischel</a>
                    <a href="https://www.farmavalue.com/cr/catalogsearch/result/?q=${encoded}" target="_blank" class="btn-buy" style="background:var(--farmavalue)">Comprar en FarmaValue</a>
                    <a href="https://www.farmacialabomba.com/${slug}?_q=${slug}&map=ft" target="_blank" class="btn-buy" style="background:var(--labomba); color:black;">Comprar en La Bomba</a>
                    <a href="https://sucreenlinea.com/catalogsearch/result/?q=${encoded}" target="_blank" class="btn-buy" style="background:var(--sucre)">Comprar en Sucre</a>
                </div>
            </div>`;
    }

    function renderProducts(data) {
        const grid = document.getElementById('productGrid');
        const activePharms = Array.from(document.querySelectorAll('.sidebar input:checked')).map(cb => cb.parentElement.textContent.trim());

        grid.innerHTML = data.map(item => {
            const prices = item.prices.filter(p => activePharms.includes(p.pharmacy)).sort((a,b) => a.price - b.price);
            if (prices.length === 0) return "";
            const minPrice = prices[0].price;

            return `<div class="product-card">
                <div style="text-align:center;"><img src="${item.image}" style="width:100%; max-width:160px; border-radius:15px;"></div>
                <div>
                    <h2 style="margin-bottom:20px; font-size:1.8rem;">${item.name}</h2>
                    <table class="comparison-table">
                        ${prices.map(p => {
                            const link = getRealLink(p.pharmacy, item.name);
                            return `<tr>
                                <td style="font-weight:700;">${p.pharmacy} ${p.price === minPrice ? '<span class="best-price-badge">EL MÁS BARATO</span>' : ''}</td>
                                <td style="font-weight:800; font-size:1.4rem;">₡${p.price.toLocaleString()}</td>
                                <td style="text-align:right;"><a href="${link}" target="_blank" class="btn-buy">Comprar ahora</a></td>
                            </tr>`;
                        }).join('')}
                    </table>
                </div>
            </div>`;
        }).join('');
    }
</script>
